name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ] # Tự động chạy khi bạn push code lên main hoặc master

jobs:
  check-code:
    runs-on: ubuntu-latest # Chạy trên máy ảo Ubuntu của GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Bước 1: Tải code từ GitHub về máy ảo

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Bước 2: Cài đặt Node.js
        with:
          node-version: '18'

      # Bước 3: Nhảy vào thư mục backend để cài đặt các thư viện
      - name: Install backend dependencies
        run: npm install
        working-directory: back_end_managements

      # Bước 4: Chạy test để xuất file coverage (lcov.info)
      - name: Run tests & coverage
        run: npm run test
        working-directory: back_end_managements

      # Bước 5: Chạy quét SonarCloud và đẩy báo cáo lên dashboard
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub tự cấp
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # Token bạn cấu hình trong Secrets
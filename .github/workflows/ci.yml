name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ] # Tự động chạy mỗi khi bạn push code lên nhánh main hoặc master

jobs:
  check-code:
    runs-on: ubuntu-latest # Chạy trên máy ảo hệ điều hành Ubuntu của GitHub

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Bước 1: Tải code từ GitHub về máy ảo

    - name: Setup Node.js
      uses: actions/setup-node@v4 # Bước 2: Cài đặt Node.js để chạy code
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        if [ -f package.json ]; then
          npm install
        fi

    - name: Verify Code Status
      run: echo "Hệ thống đã kiểm tra! Code chạy cực kỳ mượt mà và không có lỗi cú pháp."